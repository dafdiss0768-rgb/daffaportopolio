<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Daffa Control Center</title>

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:#050505;
      color:white;
      overflow-x:hidden;
    }

    .bg{
      position:fixed;
      inset:0;
      background:
      radial-gradient(circle at top left,#ff00cc33,transparent 30%),
      radial-gradient(circle at bottom right,#00ffff22,transparent 30%),
      #050505;
      z-index:-1;
    }

    .container{
      width:100%;
      min-height:100vh;
      padding:30px;
    }

    /* LOGIN */

    .login-screen{
      position:fixed;
      inset:0;
      background:#050505;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:99999;
      padding:20px;
    }

    .login-box{
      width:100%;
      max-width:420px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(20px);
      padding:40px;
      border-radius:35px;
      text-align:center;
      box-shadow:0 0 40px #ff00cc22;
    }

    .login-logo{
      width:90px;
      height:90px;
      margin:auto;
      border-radius:50%;
      background:linear-gradient(135deg,#ff00cc,#00ffff);
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:2.5rem;
      font-weight:800;
      margin-bottom:25px;
      box-shadow:
      0 0 30px #ff00cc66,
      0 0 60px #00ffff33;
    }

    .login-box h1{
      font-size:2rem;
      margin-bottom:10px;
    }

    .login-box p{
      color:#888;
      margin-bottom:25px;
    }

    .login-box input{
      width:100%;
      height:58px;
      border:none;
      outline:none;
      border-radius:18px;
      background:#111;
      color:white;
      padding:0 20px;
      margin-bottom:20px;
      border:1px solid #222;
      font-size:1rem;
    }

    .login-box button{
      width:100%;
      height:58px;
      border:none;
      border-radius:18px;
      background:linear-gradient(90deg,#ff00cc,#00ffff);
      color:white;
      font-weight:700;
      cursor:pointer;
      font-size:1rem;
      transition:.3s;
    }

    .login-box button:hover{
      transform:translateY(-3px);
      box-shadow:0 0 25px #ff00cc55;
    }

    #errorText{
      color:#ff4d4d;
      display:none;
      margin-top:15px;
      font-size:.95rem;
    }

    /* TOPBAR */

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:40px;
      gap:20px;
      flex-wrap:wrap;
    }

    .logo-box{
      display:flex;
      align-items:center;
      gap:15px;
    }

    .logo-circle{
      width:70px;
      height:70px;
      border-radius:50%;
      background:linear-gradient(135deg,#ff00cc,#00ffff);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:2rem;
      font-weight:800;
      color:white;
      box-shadow:
      0 0 25px #ff00cc88,
      0 0 50px #00ffff44;
    }

    .title{
      font-size:2rem;
      font-weight:800;
      background:linear-gradient(90deg,#ff00cc,#00ffff);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .subtitle{
      color:#888;
      margin-top:5px;
      font-size:.95rem;
    }

    .status{
      padding:12px 20px;
      border-radius:30px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(15px);
      font-size:.9rem;
      box-shadow:0 0 15px #00ff8833;
    }

    /* GRID */

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:22px;
    }

    .card{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(15px);
      border-radius:30px;
      padding:28px;
      transition:.4s;
      position:relative;
      overflow:hidden;
    }

    .card::before{
      content:'';
      position:absolute;
      width:150px;
      height:150px;
      background:#ff00cc22;
      border-radius:50%;
      top:-50px;
      right:-50px;
      filter:blur(30px);
    }

    .card:hover{
      transform:translateY(-7px);
      border-color:#ff00cc;
      box-shadow:0 0 30px #ff00cc22;
    }

    .card h3{
      font-size:1rem;
      color:#aaa;
      margin-bottom:15px;
      font-weight:400;
      position:relative;
      z-index:2;
    }

    .card h1{
      font-size:2.7rem;
      font-weight:700;
      position:relative;
      z-index:2;
    }

    .device{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      position:relative;
      z-index:2;
    }

    .device span{
      padding:10px 16px;
      border-radius:20px;
      background:#101010;
      border:1px solid #222;
      font-size:.95rem;
    }

    /* REALTIME */

    .realtime{
      margin-top:35px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(15px);
      border-radius:30px;
      padding:30px;
    }

    .realtime-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:25px;
      flex-wrap:wrap;
      gap:15px;
    }

    .realtime h2{
      font-size:1.5rem;
    }

    .pulse{
      display:flex;
      align-items:center;
      gap:10px;
      color:#00ff88;
      font-size:.95rem;
    }

    .pulse-dot{
      width:10px;
      height:10px;
      background:#00ff88;
      border-radius:50%;
      animation:pulse 1s infinite;
    }

    @keyframes pulse{
      0%{
        opacity:1;
        transform:scale(1);
      }

      100%{
        opacity:0;
        transform:scale(2);
      }
    }

    .log{
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    .log-item{
      background:#0f0f0f;
      border:1px solid #1d1d1d;
      padding:18px;
      border-radius:18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:10px;
      transition:.3s;
    }

    .log-item:hover{
      border-color:#00ffff55;
      transform:translateX(5px);
    }

    .online{
      color:#00ff88;
      font-size:.9rem;
    }

    .footer{
      margin-top:50px;
      text-align:center;
      color:#666;
      font-size:.9rem;
      padding-bottom:20px;
    }

    /* MOBILE */

    @media(max-width:768px){

      .container{
        padding:20px;
      }

      .title{
        font-size:1.5rem;
      }

      .subtitle{
        font-size:.8rem;
      }

      .logo-circle{
        width:60px;
        height:60px;
        font-size:1.5rem;
      }

      .card{
        padding:22px;
      }

      .card h1{
        font-size:2rem;
      }

      .topbar{
        align-items:flex-start;
      }

      .status{
        width:100%;
        text-align:center;
      }

      .realtime{
        padding:22px;
      }

      .login-box{
        padding:30px 25px;
      }

    }

  </style>
</head>

<body>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">

    <div class="login-box">

      <div class="login-logo">
        D
      </div>

      <h1>
        LOGIN ADMIN
      </h1>

      <p>
        Masukkan password admin
      </p>

      <input
        type="password"
        id="adminPassword"
        placeholder="Masukkan Password..."
      >

      <button onclick="checkPassword()">
        MASUK
      </button>

      <span id="errorText">
        Password Salah
      </span>

    </div>

  </div>

  <div class="bg"></div>

  <div class="container">

    <!-- TOPBAR -->
    <div class="topbar">

      <div class="logo-box">

        <div class="logo-circle">
          D
        </div>

        <div>

          <h1 class="title">
            DAFFA CONTROL
          </h1>

          <p class="subtitle">
            Sistem Monitoring Portfolio
          </p>

        </div>

      </div>

      <div class="status">
        🟢 SISTEM AKTIF
      </div>

    </div>

    <!-- GRID -->
    <div class="grid">

      <div class="card">

        <h3>
          Total Pengunjung
        </h3>

        <h1 id="visitorCount">
          0
        </h1>

      </div>

      <div class="card">

        <h3>
          Jenis Perangkat
        </h3>

        <div class="device">

          <span id="deviceType">
            Memuat...
          </span>

        </div>

      </div>

      <div class="card">

        <h3>
          Browser
        </h3>

        <h1 id="browser">
          Chrome
        </h1>

      </div>

    </div>

    <!-- REALTIME -->
    <div class="realtime">

      <div class="realtime-top">

        <h2>
          Aktivitas Pengunjung
        </h2>

        <div class="pulse">

          <div class="pulse-dot"></div>

          REALTIME

        </div>

      </div>

      <div class="log" id="logContainer">

      </div>

    </div>

    <!-- FOOTER -->
    <div class="footer">
      Daffa Portfolio Monitoring System © 2026
    </div>

  </div>

  <script>

    // =========================
    // LOGIN ADMIN
    // =========================

    const layarLogin =
      document.getElementById("loginScreen");

    const waktuSession =
      4 * 60 * 1000;

    const loginTersimpan =
      localStorage.getItem("adminLoginTime");

    // AUTO LOGIN 4 MENIT
    if(loginTersimpan){

      const sekarang = Date.now();

      if(sekarang - loginTersimpan < waktuSession){

        layarLogin.style.display = "none";

      }

    }

    function checkPassword(){

      const password =
        document.getElementById("adminPassword").value;

      if(password === "daffa123"){

        localStorage.setItem(
          "adminLoginTime",
          Date.now()
        );

        layarLogin.style.display = "none";

      } else {

        document.getElementById("errorText")
          .style.display = "block";

      }

    }

    // =========================
    // DETEKSI DEVICE
    // =========================

    const userAgent =
      navigator.userAgent;

    let tipePerangkat = "💻 Komputer";

    if(/Android|iPhone|iPad|iPod/i.test(userAgent)){
      tipePerangkat = "📱 HP";
    }

    let browser = "Tidak Diketahui";

    if(userAgent.includes("Chrome")){
      browser = "Chrome";
    }
    else if(userAgent.includes("Firefox")){
      browser = "Firefox";
    }
    else if(userAgent.includes("Safari")){
      browser = "Safari";
    }
    else if(userAgent.includes("Edge")){
      browser = "Edge";
    }

    document.getElementById("deviceType")
      .innerHTML = tipePerangkat;

    document.getElementById("browser")
      .innerHTML = browser;

    // =========================
    // TOTAL PENGUNJUNG
    // =========================

    const totalPengunjung =
      localStorage.getItem("portfolioVisitor") || 0;

    document.getElementById("visitorCount")
      .innerHTML = totalPengunjung;

    // =========================
    // LOG PENGUNJUNG
    // =========================

    const logContainer =
      document.getElementById("logContainer");

    // AMBIL DATA LAMA
    let daftarLog =
      JSON.parse(localStorage.getItem("visitorLogs"))
      || [];

    // WAKTU
    const sekarang =
      new Date();

    const waktuMasuk =
      sekarang.toLocaleTimeString("id-ID");

    const tanggalMasuk =
      sekarang.toLocaleDateString("id-ID");

    // DATA BARU
    const dataBaru = {
      perangkat: tipePerangkat,
      browser: browser,
      waktu: waktuMasuk,
      tanggal: tanggalMasuk
    };

    // MASUKKAN KE LIST
    daftarLog.unshift(dataBaru);

    // BATASI LOG
    if(daftarLog.length > 30){
      daftarLog.pop();
    }

    // SIMPAN
    localStorage.setItem(
      "visitorLogs",
      JSON.stringify(daftarLog)
    );

    // HAPUS LOG LAMA
    logContainer.innerHTML = "";

    // TAMPILKAN SEMUA LOG
    daftarLog.forEach((item) => {

      const div =
        document.createElement("div");

      div.classList.add("log-item");

      div.innerHTML = `
        <span>
          ${item.perangkat} masuk ke website
          pada ${item.tanggal}
          jam ${item.waktu}
        </span>

        <span class="online">
          ${item.browser}
        </span>
      `;

      logContainer.appendChild(div);

    });

  </script>

</body>

</html>
