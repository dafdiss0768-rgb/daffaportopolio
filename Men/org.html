<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Organisasi Gallery</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:sans-serif;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      background:#0f0f0f;
      color:white;
      overflow-x:hidden;
    }

    /* =========================
       NAVBAR
    ========================= */

    .navbar{
      width:100%;
      padding:18px 8%;

      display:flex;
      justify-content:space-between;
      align-items:center;

      position:fixed;
      top:0;
      left:0;

      background:rgba(17,17,17,0.9);

      backdrop-filter:blur(14px);

      border-bottom:1px solid rgba(255,255,255,0.05);

      z-index:1000;
    }

    .logo{
      font-size:22px;
      font-weight:700;
      letter-spacing:2px;
    }

    .menu{
      display:flex;
      gap:22px;
    }

    .menu a{
      color:white;
      text-decoration:none;
      font-size:14px;
      transition:0.3s;
    }

    .menu a:hover{
      color:#8b5cf6;
    }

    /* =========================
       FLOAT MUSIC BUTTON
    ========================= */

    .music-box{

      position:fixed;

      right:20px;
      bottom:25px;

      z-index:9999;

      display:flex;
      align-items:center;
      gap:12px;

      background:rgba(20,20,20,0.9);

      border:1px solid rgba(255,255,255,0.08);

      backdrop-filter:blur(12px);

      padding:14px 18px;

      border-radius:100px;

      box-shadow:
      0 10px 30px rgba(0,0,0,0.35);

      animation:float 3s ease-in-out infinite;
    }

    .music-btn{

      width:50px;
      height:50px;

      border-radius:50%;

      border:none;

      background:#8b5cf6;

      color:white;

      font-size:18px;

      cursor:pointer;

      transition:0.3s;
    }

    .music-btn:hover{

      transform:scale(1.08);
    }

    .music-info h3{

      font-size:14px;
      margin-bottom:3px;
    }

    .music-info p{

      font-size:11px;
      color:#b3b3b3;
    }

    @keyframes float{

      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-8px);
      }

      100%{
        transform:translateY(0px);
      }

    }

    /* =========================
       CONTENT
    ========================= */

    .container{
      width:100%;
      padding:130px 8% 70px;
    }

    .title{
      margin-bottom:45px;
      animation:fadeUp 1s ease;
    }

    .title h1{
      font-size:52px;
      margin-bottom:12px;
    }

    .title p{
      color:#b3b3b3;
      line-height:1.8;
      max-width:650px;
      font-size:15px;
    }

    /* =========================
       GALLERY
    ========================= */

    .gallery{
      display:grid;

      grid-template-columns:
      repeat(auto-fit,minmax(350px,1fr));

      gap:25px;
    }

    .video-card{
      position:relative;

      overflow:hidden;

      border-radius:24px;

      background:#151515;

      border:1px solid rgba(255,255,255,0.05);

      transition:0.45s ease;

      opacity:0;
      transform:translateY(40px);
    }

    .video-card:hover{
      transform:translateY(-8px);

      box-shadow:
      0 15px 35px rgba(139,92,246,0.22);
    }

    .video-card video{
      width:100%;
      display:block;

      border-radius:24px;
    }

    /* =========================
       SCROLLBAR
    ========================= */

    ::-webkit-scrollbar{
      width:8px;
    }

    ::-webkit-scrollbar-track{
      background:#111;
    }

    ::-webkit-scrollbar-thumb{
      background:#8b5cf6;
      border-radius:20px;
    }

    /* =========================
       ANIMATION
    ========================= */

    @keyframes fadeUp{

      from{
        opacity:0;
        transform:translateY(40px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    /* =========================
       MOBILE
    ========================= */

    @media(max-width:768px){

      .navbar{
        padding:15px 5%;
      }

      .logo{
        font-size:17px;
      }

      .menu{
        gap:14px;
      }

      .menu a{
        font-size:11px;
      }

      .container{
        padding:95px 5% 45px;
      }

      .title h1{
        font-size:30px;
      }

      .title p{
        font-size:13px;
      }

      .gallery{
        grid-template-columns:1fr;
        gap:20px;
      }

      .video-card{
        border-radius:18px;
      }

      .video-card video{
        border-radius:18px;
      }

      .music-box{

        right:12px;
        bottom:15px;

        padding:12px 14px;
      }

      .music-btn{

        width:45px;
        height:45px;

        font-size:16px;
      }

      .music-info h3{

        font-size:12px;
      }

      .music-info p{

        font-size:10px;
      }

    }

  </style>

</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">

    <div class="logo">
      DAFFAIZAL
    </div>

    <div class="menu">
      <a href="../index.html">Home</a>
      <a href="../index.html#project">Project</a>
      <a href="../index.html#contact">Contact</a>
    </div>

  </nav>

  <!-- FLOAT MUSIC -->
  <div class="music-box">

    <button class="music-btn" id="musicBtn">
      ▶
    </button>

    <div class="music-info">
      <h3>Play Music</h3>
      <p>Temani gallery organisasi</p>
    </div>

  </div>

  <!-- AUDIO -->
  <audio id="bgMusic" loop>
    <source src="../music/lagu.mp3" type="audio/mp3">
  </audio>

  <!-- CONTENT -->
  <div class="container">

    <div class="title">

      <h1>Organisasi Gallery</h1>

      <p>
        Dokumentasi kegiatan organisasi, kepanitiaan,
        dan berbagai momen kebersamaan yang pernah
        saya jalani selama sekolah.
      </p>

    </div>

    <!-- GALLERY -->
    <div class="gallery">

      <!-- VIDEO 1 -->
      <div class="video-card">

        <video controls playsinline>
          <source src="../Vid/dafa tugas (1).mp4" type="video/mp4">
        </video>

      </div>

      <!-- VIDEO 2 -->
      <div class="video-card">

        <video controls playsinline>
          <source src="../Vid/vide1 .mp4" type="video/mp4">
        </video>

      </div>

      <!-- VIDEO 3 -->
      <div class="video-card">

        <video controls playsinline>
          <source src="../Vid/vide2.mp4" type="video/mp4">
        </video>

      </div>

      <!-- VIDEO 4 -->
      <div class="video-card">

        <video controls playsinline>
          <source src="../Vid/Proyek Baru [28BD412] (1).mp4" type="video/mp4">
        </video>

      </div>

    </div>

  </div>

  <!-- JAVASCRIPT -->
  <script>

    // ANIMATION
    const cards =
    document.querySelectorAll(".video-card");

    const observer =
    new IntersectionObserver((entries)=>{

      entries.forEach((entry)=>{

        if(entry.isIntersecting){

          entry.target.style.opacity = "1";

          entry.target.style.transform =
          "translateY(0px)";

        }

      });

    },{threshold:0.2});

    cards.forEach((card)=>{

      observer.observe(card);

    });

    // MUSIC
    const music =
    document.getElementById("bgMusic");

    const btn =
    document.getElementById("musicBtn");

    let playing = false;

    btn.onclick = () => {

      if(!playing){

        music.play();

        btn.innerHTML = "❚❚";

        playing = true;

      }else{

        music.pause();

        btn.innerHTML = "▶";

        playing = false;
      }

    };

  </script>

</body>

</html>
