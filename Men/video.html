<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Daffaizal | Video Gallery</title>

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:#070707;
      color:white;
      overflow-x:hidden;
    }

    /* =========================
       BACKGROUND
    ========================= */

    .blur{
      position:fixed;
      width:350px;
      height:350px;
      border-radius:50%;
      filter:blur(120px);
      opacity:0.45;
      z-index:-1;
    }

    .blur1{
      top:-120px;
      left:-120px;
      background:#8b5cf6;
    }

    .blur2{
      bottom:-120px;
      right:-120px;
      background:#2563eb;
    }

    /* =========================
       NAVBAR
    ========================= */

    .navbar{
      width:100%;
      padding:18px 8%;

      display:flex;
      justify-content:space-between;
      align-items:center;

      position:fixed;
      top:0;
      left:0;

      background:rgba(10,10,10,0.7);

      backdrop-filter:blur(14px);

      border-bottom:
      1px solid rgba(255,255,255,0.06);

      z-index:1000;
    }

    .logo{
      font-size:24px;
      font-weight:700;
      letter-spacing:2px;
    }

    .logo span{
      color:#8b5cf6;
    }

    .menu{
      display:flex;
      gap:24px;
    }

    .menu a{
      color:#d4d4d4;
      text-decoration:none;
      font-size:14px;
      font-weight:500;

      position:relative;

      transition:0.3s;
    }

    .menu a::after{
      content:"";
      position:absolute;

      left:0;
      bottom:-5px;

      width:0%;
      height:2px;

      background:#8b5cf6;

      transition:0.3s;
    }

    .menu a:hover{
      color:white;
    }

    .menu a:hover::after{
      width:100%;
    }

    /* =========================
       CONTENT
    ========================= */

    .container{
      width:100%;
      padding:150px 8% 80px;
    }

    .title{
      margin-bottom:60px;
      max-width:700px;

      animation:fadeUp 1s ease;
    }

    .title h1{
      font-size:58px;
      line-height:1.1;
      margin-bottom:16px;
      font-weight:800;
    }

    .title h1 span{
      color:#8b5cf6;
    }

    .title p{
      color:#b3b3b3;
      line-height:1.9;
      font-size:15px;
    }

    /* =========================
       SECTION TITLE
    ========================= */

    .section-title{
      font-size:30px;
      margin-bottom:28px;
      font-weight:700;
    }

    .section-title span{
      color:#8b5cf6;
    }

    /* =========================
       LANDSCAPE SLIDER
    ========================= */

    .slider-wrapper{
      position:relative;
      width:100%;
      margin-bottom:80px;
    }

    .landscape-slider{
      width:100%;
    }

    .landscape-card{
      display:none;

      border-radius:28px;

      overflow:hidden;

      background:#111;

      border:
      1px solid rgba(255,255,255,0.06);

      animation:fade 0.4s ease;
    }

    .landscape-card.active-slide{
      display:block;
    }

    .landscape-card video{
      width:100%;
      aspect-ratio:16/9;

      object-fit:cover;

      display:block;
    }

    /* =========================
       PORTRAIT
    ========================= */

    .portrait-wrapper{
      position:relative;

      display:flex;
      justify-content:center;
      align-items:center;
    }

    .portrait-slider{
      width:340px;
    }

    .portrait-card{
      display:none;

      border-radius:28px;

      overflow:hidden;

      background:#111;

      border:
      1px solid rgba(255,255,255,0.06);

      animation:fade 0.4s ease;
    }

    .portrait-card.active-portrait{
      display:block;
    }

    .portrait-card video{
      width:100%;
      aspect-ratio:9/16;

      object-fit:cover;

      display:block;
    }

    /* =========================
       BUTTON
    ========================= */

    .slider-btn{
      position:absolute;
      top:50%;

      transform:translateY(-50%);

      width:55px;
      height:55px;

      border:none;

      border-radius:50%;

      background:
      rgba(255,255,255,0.12);

      backdrop-filter:blur(10px);

      color:white;

      font-size:28px;

      cursor:pointer;

      z-index:10;

      transition:0.3s ease;
    }

    .slider-btn:hover{
      background:#8b5cf6;
    }

    .landscape-prev,
    .portrait-prev{
      left:-20px;
    }

    .landscape-next,
    .portrait-next{
      right:-20px;
    }

    /* =========================
       FOOTER
    ========================= */

    footer{
      text-align:center;
      padding:70px 20px 30px;

      color:#777;
      font-size:14px;
    }

    /* =========================
       ANIMATION
    ========================= */

    @keyframes fade{

      from{
        opacity:0;
        transform:scale(0.98);
      }

      to{
        opacity:1;
        transform:scale(1);
      }

    }

    @keyframes fadeUp{

      from{
        opacity:0;
        transform:translateY(40px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    /* =========================
       MOBILE
    ========================= */

    @media(max-width:768px){

      .navbar{
        padding:16px 5%;
      }

      .logo{
        font-size:18px;
      }

      .menu{
        gap:14px;
      }

      .menu a{
        font-size:12px;
      }

      .container{
        padding:120px 5% 60px;
      }

      .title{
        margin-bottom:45px;
      }

      .title h1{
        font-size:38px;
      }

      .title p{
        font-size:14px;
      }

      .section-title{
        font-size:24px;
      }

      .portrait-slider{
        width:260px;
      }

      .slider-btn{
        width:45px;
        height:45px;
        font-size:22px;
      }

      .landscape-prev,
      .portrait-prev{
        left:-10px;
      }

      .landscape-next,
      .portrait-next{
        right:-10px;
      }

    }

  </style>

</head>

<body>

  <!-- BACKGROUND -->
  <div class="blur blur1"></div>
  <div class="blur blur2"></div>

  <!-- NAVBAR -->
  <nav class="navbar">

    <div class="logo">
      DAFFA<span>IZAL</span>
    </div>

    <div class="menu">
      <a href="../index.html">Home</a>
      <a href="../index.html#project">Project</a>
      <a href="../index.html#contact">Contact</a>
    </div>

  </nav>

  <!-- CONTENT -->
  <section class="container">

    <div class="title">

      <h1>Video <span>Gallery</span></h1>

      <p>
        Kumpulan video editing, cinematic,
        motion graphic, dan visual kreatif
        dengan tampilan modern, clean,
        dan responsive.
      </p>

    </div>

    <!-- LANDSCAPE -->
    <h2 class="section-title">
      Landscape <span>Video</span>
    </h2>

    <div class="slider-wrapper">

      <!-- BUTTON -->
      <button class="slider-btn landscape-prev">
        ‹
      </button>

      <!-- SLIDER -->
      <div class="landscape-slider">

        <!-- VIDEO 1 -->
        <div class="landscape-card active-slide">

          <video
          controls
          preload="metadata"
          playsinline>

            <source
            src="../Vid/dafa tugas (1).mp4"
            type="video/mp4">

          </video>

        </div>

        <!-- VIDEO 2 -->
        <div class="landscape-card">

          <video
          controls
          preload="metadata"
          playsinline>

            <source
            src="../Vid/vide1 .mp4"
            type="video/mp4">

          </video>

        </div>

        <!-- VIDEO 3 -->
        <div class="landscape-card">

          <video
          controls
          preload="metadata"
          playsinline>

            <source
            src="../Vid/Proyek Baru [28BD412] (1).mp4"
            type="video/mp4">

          </video>

        </div>

      </div>

      <!-- BUTTON -->
      <button class="slider-btn landscape-next">
        ›
      </button>

    </div>

    <!-- PORTRAIT -->
    <h2 class="section-title">
      Portrait <span>Video</span>
    </h2>

    <div class="portrait-wrapper">

      <!-- BUTTON -->
      <button class="slider-btn portrait-prev">
        ‹
      </button>

      <!-- SLIDER -->
      <div class="portrait-slider">

        <!-- VIDEO -->
        <div class="portrait-card active-portrait">

          <video
          controls
          preload="metadata"
          playsinline>

            <source
            src="../Vid/vide2.mp4"
            type="video/mp4">

          </video>

        </div>

      </div>

      <!-- BUTTON -->
      <button class="slider-btn portrait-next">
        ›

      </button>

    </div>

  </section>

  <!-- FOOTER -->
  <footer>
    © 2026 Daffaizal Portfolio.
    All Rights Reserved.
  </footer>

  <!-- SCRIPT -->
  <script>

    /* =========================
       LANDSCAPE SLIDER
    ========================= */

    const landscapeSlides =
    document.querySelectorAll(
    ".landscape-card"
    );

    let landscapeIndex = 0;

    function showLandscape(index){

      landscapeSlides.forEach((slide)=>{

        slide.classList.remove(
        "active-slide"
        );

      });

      landscapeSlides[index]
      .classList.add(
      "active-slide"
      );

    }

    document.querySelector(
    ".landscape-next"
    ).onclick = ()=>{

      landscapeIndex++;

      if(
        landscapeIndex >=
        landscapeSlides.length
      ){
        landscapeIndex = 0;
      }

      showLandscape(
      landscapeIndex
      );

    };

    document.querySelector(
    ".landscape-prev"
    ).onclick = ()=>{

      landscapeIndex--;

      if(landscapeIndex < 0){

        landscapeIndex =
        landscapeSlides.length - 1;

      }

      showLandscape(
      landscapeIndex
      );

    };

    /* =========================
       PORTRAIT SLIDER
    ========================= */

    const portraitSlides =
    document.querySelectorAll(
    ".portrait-card"
    );

    let portraitIndex = 0;

    function showPortrait(index){

      portraitSlides.forEach((slide)=>{

        slide.classList.remove(
        "active-portrait"
        );

      });

      portraitSlides[index]
      .classList.add(
      "active-portrait"
      );

    }

    document.querySelector(
    ".portrait-next"
    ).onclick = ()=>{

      portraitIndex++;

      if(
        portraitIndex >=
        portraitSlides.length
      ){
        portraitIndex = 0;
      }

      showPortrait(
      portraitIndex
      );

    };

    document.querySelector(
    ".portrait-prev"
    ).onclick = ()=>{

      portraitIndex--;

      if(portraitIndex < 0){

        portraitIndex =
        portraitSlides.length - 1;

      }

      showPortrait(
      portraitIndex
      );

    };

  </script>

</body>

</html>
