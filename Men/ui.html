<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sedang Proses</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #111827, #1f2937, #000);
      overflow: hidden;
    }

    .box{
      position: relative;
      padding: 30px 60px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 30px rgba(0,255,255,0.2);
      overflow: hidden;
    }

    .box::before{
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        45deg,
        transparent,
        rgba(0,255,255,0.4),
        transparent
      );
      animation: shine 4s linear infinite;
    }

    @keyframes shine{
      0%{
        transform: translateX(-100%) translateY(-100%) rotate(45deg);
      }
      100%{
        transform: translateX(100%) translateY(100%) rotate(45deg);
      }
    }

    h1{
      position: relative;
      color: #fff;
      font-size: 3rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-align: center;
      animation: glow 2s ease-in-out infinite alternate;
      z-index: 2;
    }

    @keyframes glow{
      from{
        text-shadow:
          0 0 10px #00ffff,
          0 0 20px #00ffff,
          0 0 40px #00ffff;
      }
      to{
        text-shadow:
          0 0 20px #00ffff,
          0 0 40px #00ffff,
          0 0 80px #00ffff;
      }
    }

    .dots::after{
      content: "";
      animation: dots 2s infinite;
    }

    @keyframes dots{
      0%{ content: ""; }
      25%{ content: "."; }
      50%{ content: ".."; }
      75%{ content: "..."; }
      100%{ content: ""; }
    }

    @media(max-width: 600px){
      h1{
        font-size: 2rem;
      }

      .box{
        padding: 25px 35px;
      }
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>SEDANG PROSES<span class="dots"></span></h1>
  </div>

</body>
</html>
